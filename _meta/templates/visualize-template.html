<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --bg: #fafaf7;
        --surface: #ffffff;
        --surface-2: #f3f1ea;
        --text: #1a1a1a;
        --text-muted: #5a5a5a;
        --text-soft: #7a7a7a;
        --border: #e1ddd2;
        --border-strong: #c9c4b5;
        --accent: #0a4d8c;
        --accent-soft: #e3edf7;
        --good: #1f6f3c;
        --good-bg: #e6f3ec;
        --warn: #a85a00;
        --warn-bg: #fbeed7;
        --bad: #a32820;
        --bad-bg: #fbe4e2;
        --neutral: #5a5a5a;
        --neutral-bg: #ececea;
        --code-bg: #1f1f1f;
        --code-text: #f1f1f1;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.04);
        --serif: Georgia, "Times New Roman", "Liberation Serif", serif;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        line-height: 1.65;
        font-size: 15.5px;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 880px;
        margin: 0 auto;
        padding: 56px 32px 96px;
      }

      header.title-block {
        border-bottom: 2px solid var(--text);
        padding-bottom: 20px;
        margin-bottom: 32px;
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
      h1 {
        font-family: var(--serif);
        font-size: 38px;
        line-height: 1.18;
        margin: 0 0 10px;
        font-weight: 700;
      }
      .subtitle {
        font-family: var(--serif);
        font-style: italic;
        font-size: 18px;
        color: var(--text-muted);
        margin: 0;
      }

      h2 {
        font-family: var(--serif);
        font-size: 28px;
        margin: 48px 0 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-strong);
      }
      h3 { font-family: var(--serif); font-size: 21px; margin: 32px 0 10px; }
      h4 {
        font-family: var(--sans);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin: 20px 0 8px;
      }

      p { margin: 0 0 14px; }
      .lead {
        font-family: var(--serif);
        font-size: 20px;
        line-height: 1.55;
        color: var(--text);
        margin: 24px 0;
      }

      /* Verdict badges */
      .verdict {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .verdict.good { background: var(--good-bg); color: var(--good); }
      .verdict.warn { background: var(--warn-bg); color: var(--warn); }
      .verdict.bad { background: var(--bad-bg); color: var(--bad); }
      .verdict.neutral { background: var(--neutral-bg); color: var(--neutral); }
      .verdict.accent { background: var(--accent-soft); color: var(--accent); }

      /* Callouts */
      .callout {
        background: var(--surface);
        border-left: 4px solid var(--accent);
        padding: 18px 22px;
        margin: 24px 0;
        box-shadow: var(--shadow);
      }
      .callout.bad { border-left-color: var(--bad); background: var(--bad-bg); }
      .callout.warn { border-left-color: var(--warn); background: var(--warn-bg); }
      .callout.good { border-left-color: var(--good); background: var(--good-bg); }
      .callout h4 { margin: 0 0 8px; color: var(--text); }
      .callout p:last-child { margin-bottom: 0; }

      /* Glossary — used by the "Termos" / definitions block */
      dl.glossary {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 8px 20px;
        margin: 16px 0 24px;
        padding: 18px 22px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 14.5px;
      }
      dl.glossary dt {
        font-family: var(--mono);
        font-weight: 600;
        color: var(--accent);
      }
      dl.glossary dd {
        margin: 0;
        color: var(--text);
      }
      @media (max-width: 700px) {
        dl.glossary { grid-template-columns: 1fr; gap: 4px 0; }
        dl.glossary dt { margin-top: 8px; }
      }

      /* Tables */
      .table-wrap {
        overflow-x: auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        box-shadow: var(--shadow);
        margin: 16px 0 28px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th, td {
        text-align: left;
        padding: 10px 12px;
        vertical-align: top;
        border-bottom: 1px solid var(--border);
      }
      thead th {
        background: var(--surface-2);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        font-weight: 600;
        white-space: nowrap;
      }
      tbody tr:hover { background: rgba(0, 0, 0, 0.015); }

      /* Code */
      pre {
        background: var(--code-bg);
        color: var(--code-text);
        padding: 14px 18px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: var(--mono);
        font-size: 12.5px;
        line-height: 1.55;
        margin: 14px 0;
      }
      pre code { background: transparent; padding: 0; border: 0; color: inherit; font-size: inherit; }
      code {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--surface-2);
        padding: 1px 6px;
        border-radius: 3px;
        border: 1px solid var(--border);
      }
      .path {
        font-family: var(--mono);
        font-size: 12.5px;
        background: var(--surface-2);
        padding: 1px 6px;
        border-radius: 3px;
        border: 1px solid var(--border);
      }

      /* Lists */
      ul, ol { margin: 8px 0 18px; padding-left: 26px; }
      li { margin: 6px 0; }
      li > p { margin: 0 0 6px; }

      /* Links */
      a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
      a:hover { border-bottom-color: var(--accent); }

      /* Blockquote */
      blockquote {
        font-family: var(--serif);
        font-style: italic;
        color: var(--text-muted);
        border-left: 3px solid var(--border-strong);
        padding: 4px 16px;
        margin: 14px 0;
      }

      hr { border: 0; border-top: 1px solid var(--border-strong); margin: 32px 0; }

      footer.footer {
        margin-top: 64px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-soft);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      @media (max-width: 700px) {
        .container { padding: 36px 18px 64px; }
        h1 { font-size: 30px; }
        h2 { font-size: 23px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="title-block">
        <div class="eyebrow">{{EYEBROW}}</div>
        <h1>{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </header>

      {{BODY}}

      <footer class="footer">
        <span>Gerado por /ahead:visualize</span>
        <span>{{TIMESTAMP}}</span>
      </footer>
    </div>
  </body>
</html>
